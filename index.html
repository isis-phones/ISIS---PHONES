<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iPhone Store Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'SF Pro Display', Arial, sans-serif;
        }

        body {
            background-color: #f5f5f7;
            color: #1d1d1f;
        }

        header {
            background: #000;
            padding: 20px 8%;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 {
            color: #fff;
            font-size: 24px;
            font-weight: 600;
        }

        nav a {
            color: #fff;
            text-decoration: none;
            margin-left: 20px;
            font-weight: 400;
            transition: 0.3s;
        }

        nav a:hover {
            color: #0071e3;
        }

        .hero {
            text-align: center;
            padding: 80px 20px;
            background: linear-gradient(to right, #000, #1c1c1e);
            color: #fff;
        }

        .hero h2 {
            font-size: 42px;
            margin-bottom: 20px;
        }

        .hero p {
            font-size: 18px;
            margin-bottom: 30px;
            color: #ccc;
        }

        .btn {
            padding: 12px 30px;
            background: #0071e3;
            color: #fff;
            text-decoration: none;
            border-radius: 30px;
            font-weight: 600;
            transition: 0.3s;
        }

        .btn:hover {
            background: #005bb5;
        }

        .products {
            padding: 60px 8%;
            text-align: center;
        }

        .products h3 {
            font-size: 32px;
            margin-bottom: 40px;
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 30px;
        }

        .product-card {
            background: #fff;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            transition: 0.3s;
        }

        .product-card:hover {
            transform: translateY(-5px);
        }

        .product-card img {
            width: 100%;
            max-height: 220px;
            object-fit: contain;
            margin-bottom: 15px;
        }

        .product-card h4 {
            margin-bottom: 10px;
        }

        .price {
            font-size: 18px;
            font-weight: bold;
            color: #0071e3;
            margin-bottom: 15px;
        }

        footer {
            background: #000;
            color: #ccc;
            text-align: center;
            padding: 20px;
            margin-top: 60px;
        }

        @media(max-width:768px){
            .hero h2{
                font-size: 30px;
            }
        }

    </style>
</head>
<body>

<header>
    <h1>iPhone Store Pro</h1>
    <nav>
        <a href="#">Início</a>
        <a href="#">Produtos</a>
        <a href="#">Contato</a>
    </nav>
</header>

<section class="hero">
    <h2>O Novo iPhone Está Aqui</h2>
    <p>Tecnologia, inovação e desempenho em suas mãos.</p>
    <a href="#produtos" class="btn">Ver Produtos</a>
</section>

<section class="products" id="produtos">
    <h3>Nossos iPhones</h3>
    <div class="product-grid">
        
        <div class="product-card">
            <img src="https://via.placeholder.com/300x300" alt="iPhone 15 Pro">
            <h4>iPhone 15 Pro</h4>
            <p class="price">R$ 7.999</p>
            <a href="#" class="btn">Comprar</a>
        </div>

        <div class="product-card">
            <img src="https://via.placeholder.com/300x300" alt="iPhone 15">
            <h4>iPhone 15</h4>
            <p class="price">R$ 6.499</p>
            <a href="#" class="btn">Comprar</a>
        </div>

        <div class="product-card">
            <img src="https://via.placeholder.com/300x300" alt="iPhone 14">
            <h4>iPhone 14</h4>
            <p class="price">R$ 5.299</p>
            <a href="#" class="btn">Comprar</a>
        </div>

    </div>
</section>

<footer>
    <p>© 2026 iPhone Store Pro - Todos os direitos reservados</p>
</footer>

</body>
</html>
